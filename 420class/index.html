<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <div class="browser">
      <div class="boardComp">
        <div class="container">
          <div class="input">
            <h3>To-Do list</h3>
            <div class="inputContainer">
              <input id="inputText" placeholder="Add a new task .." ></input>
              <button id="button-container" onclick="mybutton()">Add</button>
            </div>
            <div class="filterContainer">
              <button class="tab1" onclick="showAll(this)">All</button>
              <button class="tab2" onclick="showActive(this)">Active</button>
              <button class="tab3"onclick="showCompleted(this)">Completed</button>
            </div>
          </div>
          <div class="taskContainer" id="container">No tasks yet. Add one above!
            <div id="taskItem">
                <div class="itemStyle">
                     <input type="checkbox">
                     <label></label>
                </div>
                <button class="delete">Delete</button>
            </div>
          </div>
        </div>
        <div class="footerContainer">
          <div class="footerText">Powered by</div>
          <a href="">Pinecone academy</a>
        </div>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
